<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Games · ChanceITstudio</title>
    <meta name="description" content="A directory of browser games by ChanceITstudio. Pick a game and play it in the field, fullscreen optional." />
    <link rel="icon" href="assets/favicon-32.png" sizes="32x32" />
    <link rel="icon" href="assets/favicon.png" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
    <meta property="og:image" content="assets/og-banner.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Saira+Stencil+One&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body data-view="directory">
    <div id="app"></div>

    <!-- Plain scripts (no ES modules) so the hub runs on file:// too.
         Order matters: data + libs first, app.js last. -->
    <script src="src/manifest.js" defer></script>
    <script src="src/achievements.js" defer></script>
    <script src="src/store.js" defer></script>
    <script src="src/bridge.js" defer></script>
    <script src="src/views/directory.js" defer></script>
    <script src="src/views/play.js" defer></script>
    <script src="app.js" defer></script>
  </body>
</html>
